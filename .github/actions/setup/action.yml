name: Setup
description: Setup pnpm, Node.js 22, install dependencies, and build

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6.0.9
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    - run: pnpm build
      shell: bash
