packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  core-js: true
  esbuild: true
  onnxruntime-node: true

catalog:
  '@biomejs/biome': 2.5.0
  '@hono/node-server': 2.0.5
  '@types/node': 22.19.21
  '@types/pngjs': 6.0.5
  hono: 4.12.25
  onnxruntime-node: 1.27.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  pngjs: 7.0.0
  tsdown: 0.22.2
  tsx: 4.22.4
  typescript: 6.0.3
  vitest: 4.1.9

# onnxruntime-node はプラットフォーム別のネイティブバイナリを含む。
# pnpm 10 はデフォルトで依存のビルドスクリプトを実行しないため、明示的に許可する。
onlyBuiltDependencies:
  - '@biomejs/biome'
  - core-js
  - esbuild
  - onnxruntime-node
