packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  '@tensorflow/tfjs-node': true
  core-js: true
  esbuild: true

catalog:
  '@biomejs/biome': 2.4.16
  '@hono/node-server': 2.0.4
  '@tensorflow/tfjs': 4.22.0
  '@tensorflow/tfjs-node': 4.22.0
  '@types/node': 22.19.20
  hono: 4.12.25
  nsfwjs: 4.3.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  systeminformation: 5.31.7
  tsdown: 0.22.2
  tsx: 4.22.4
  typescript: 6.0.3
  vitest: 4.1.8

# @tensorflow/tfjs-node はネイティブアドオン（libtensorflow + node-gyp ビルド）を持つ。
# pnpm 10 はデフォルトで依存のビルドスクリプトを実行しないため、明示的に許可する。
onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@tensorflow/tfjs-node'
  - core-js
  - esbuild
